version: "3"

services:
  mongodb:
    image: mongo
    ports:
      - "27017:27017"

  auth:
    build: ./services/auth
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/risetogether
    depends_on:
      - mongodb

  gateway:
    build: ./gateway
    ports:
      - "5000:5000"
    depends_on:
      - auth