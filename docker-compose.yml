version: "3"

services:
  mongodb:
    image: mongo
    container_name: rise-mongo
    ports:
      - "27017:27017"

  auth:
    build: ./services/auth
    container_name: rise-auth
    ports:
      - "5001:5001"
    depends_on:
      - mongodb

  gateway:
    build: ./services/gateway
    container_name: rise-gateway
    ports:
      - "5000:5000"
    depends_on:
      - auth